[workspace]
resolver = "2"

members = [
    "crates/rupa-core",
    "crates/rupa-ui",
    "crates/rupa-engine",
    "crates/rupa-macros",
    "crates/rupa",
    "crates/rupa-server",
    "crates/rupa-client",
    "crates/rupa-docs",
    "crates/rupa-signals",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Reas Vyn <reasvyn@gmail.com>"]
description = "A high-performance, full-stack cross-platform UI framework for Rust artisans. Built with an Atoms & Composites modular architecture."
license = "MIT"
repository = "https://github.com/rupa-labs/rupa"

[workspace.dependencies]
# Internal crates (Atoms)
rupa-signals = { path = "crates/rupa-signals" }

# Internal crates (Composites)
rupa-core = { path = "crates/rupa-core" }
rupa-ui = { path = "crates/rupa-ui" }
rupa-engine = { path = "crates/rupa-engine" }
rupa-macros = { path = "crates/rupa-macros" }
rupa-server = { path = "crates/rupa-server" }
rupa-client = { path = "crates/rupa-client" }
rupa-docs = { path = "crates/rupa-docs" }

# Third party (Centralized for maintenance)
log = "0.4"
taffy = "0.4"
wgpu = "0.19"
winit = "0.29"
crossterm = "0.27"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
futures = "0.3"
raw-window-handle = "0.6"
web-sys = { version = "0.3" }
js-sys = "0.3"
wasm-bindgen = "0.2"
axum = "0.7"
tokio = { version = "1.0", features = ["full"] }
