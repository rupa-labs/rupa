[package]
name = "rupaui"
version = "0.1.0"
edition = "2024"
description = "A semantic, utility-first UI framework for Rust."
license = "MIT"
repository = "https://github.com/reasnov/rupaui"
keywords = ["ui", "gui", "wgpu", "framework"]
categories = ["gui", "graphics"]

[dependencies]

# Windowing and Input
winit = { version = "0.30", features = ["rwh_06"] }
raw-window-handle = "0.6"

# Graphics and Rendering
wgpu = "28.0"
bytemuck = { version = "1.16", features = ["derive"] }

# Layout Engine
taffy = "0.5"

# Text Rendering
glyphon = "0.10"
cosmic-text = "0.15"

# Graphics Utilities
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }

# Async Runtime Helper
pollster = "0.3"

# Logging
log = "0.4"
env_logger = "0.11"

# Utilities
once_cell = "1.19"
uuid = { version = "1.10", features = ["v4", "fast-rng"] }
thiserror = "1.0"

# Optional math utilities (useful for graphics)
glam = "0.27"

[dev-dependencies]

# Testing utilities
pretty_assertions = "1.4"

[target.'cfg(target_arch = "wasm32")'.dependencies]

wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"

web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    "Element"
] }

console_log = "1.0"
console_error_panic_hook = "0.1"
