[package]
name = "rupaui"
version = "0.1.0"
edition = "2024"
description = "A semantic, utility-first UI framework for Rust."

[dependencies]
# Windowing and Input
winit = { version = "0.30", features = ["rwh_06"] }

# Graphics and Rendering
wgpu = "23.0"
bytemuck = { version = "1.16", features = ["derive"] }

# Layout Engine
taffy = "0.5"

# Graphics Utils
pollster = "0.3"
image = "0.25"
wgpu_glyph = "0.23"

# Logging and Utilities
log = "0.4"
raw-window-handle = "0.6"
once_cell = "1.19"
uuid = { version = "1.10", features = ["v4", "fast-rng"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["CanvasRenderingContext2d", "Element", "HtmlCanvasElement", "Window", "Document"] }
console_log = "1.0"
console_error_panic_hook = "0.1"
