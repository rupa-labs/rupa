[package]
name = "rupaui"
version = "0.1.0"
edition = "2024"
description = "A semantic, utility-first UI framework for Rust."
license = "MIT"
repository = "https://github.com/reasnov/rupaui"
keywords = ["ui", "gui", "wgpu", "framework", "tui"]
categories = ["gui", "graphics"]

[features]
default = ["desktop"]
desktop = [
    "dep:winit", 
    "dep:wgpu", 
    "dep:glyphon", 
    "dep:cosmic-text", 
    "dep:image", 
    "dep:pollster",
    "dep:accesskit",
    "dep:accesskit_winit"
]
terminal = ["dep:crossterm"]
web = [
    "dep:winit", 
    "dep:wgpu", 
    "dep:glyphon", 
    "dep:cosmic-text", 
    "dep:image", 
    "dep:pollster"
]
mobile = [
    "dep:winit", 
    "dep:wgpu", 
    "dep:glyphon", 
    "dep:cosmic-text", 
    "dep:image", 
    "dep:pollster"
]

[dependencies]
# Layout Engine
taffy = "0.5"

# Utilities
once_cell = "1.19"
raw-window-handle = "0.6"
uuid = { version = "1.10", features = ["v4", "fast-rng"] }
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
bytemuck = { version = "1.16", features = ["derive"] }
glam = "0.27"

# Desktop Dependencies (Winit + WGPU)
winit = { version = "0.30", features = ["rwh_06"], optional = true }
wgpu = { version = "28.0", optional = true }
glyphon = { version = "0.10", optional = true }
cosmic-text = { version = "0.15", optional = true }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"], optional = true }
pollster = { version = "0.3", optional = true }
accesskit = { version = "0.16", optional = true }
accesskit_winit = { version = "0.22", optional = true }

# Terminal Dependencies (Crossterm)
crossterm = { version = "0.28", optional = true }

[dev-dependencies]
pretty_assertions = "1.4"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    "Element",
    "Gpu",
    "Navigator",
    "KeyboardEvent",
    "MouseEvent",
    "TouchEvent",
    "WheelEvent",
    "PointerEvent",
    "EventTarget"
] }
console_log = "1.0"
console_error_panic_hook = "0.1"
