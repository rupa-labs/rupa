[package]
name = "rupa-engine"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[features]
default = ["desktop"]
desktop = ["gui", "dep:winit", "dep:wgpu", "dep:glyphon", "dep:image", "dep:bytemuck"]
terminal = ["tui", "dep:crossterm"]
web = ["gui", "dep:winit", "dep:wgpu", "dep:glyphon", "dep:image", "dep:bytemuck"]
mobile = ["gui", "dep:winit", "dep:wgpu", "dep:glyphon", "dep:image", "dep:bytemuck"]

# Internal features
gui = []
tui = []

[dependencies]
rupa-core.workspace = true
rupa-ui.workspace = true
rupa-styling.workspace = true
rupa-vnode.workspace = true
log.workspace = true
taffy.workspace = true
futures.workspace = true
raw-window-handle.workspace = true
once_cell = "1.18"
pollster.workspace = true

winit = { workspace = true, optional = true }
wgpu = { workspace = true, optional = true }
crossterm = { workspace = true, optional = true }
glyphon = { workspace = true, optional = true }
bytemuck = { workspace = true, optional = true }
image = { workspace = true, optional = true }
