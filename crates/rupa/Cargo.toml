[package]
name = "rupa"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
rupa-core.workspace = true
rupa-ui.workspace = true
rupa-engine.workspace = true
rupa-macros.workspace = true
rupa-signals.workspace = true
rupa-vnode.workspace = true
rupa-store.workspace = true
rupa-net.workspace = true
rupa-auth.workspace = true
rupa-i18n.workspace = true
rupa-motion.workspace = true
rupa-assets.workspace = true
log.workspace = true

# Showrooms
rupa-desktop = { workspace = true, optional = true }
rupa-tui = { workspace = true, optional = true }
rupa-web = { workspace = true, optional = true }
rupa-server = { workspace = true, optional = true }

[features]
default = ["desktop"]
desktop = ["rupa-desktop"]
tui = ["rupa-tui"]
ssr = ["rupa-server"]
web = ["rupa-web"]
