[package]
name = "rupa-web"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "The Browser showroom for the Rupa Framework, supporting WASM and DOM rendering."
repository.workspace = true
readme = "README.md"
keywords = ["rupa", "web", "wasm", "dom"]
categories = ["gui", "web-programming"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
rupa-core.workspace = true
rupa-ui.workspace = true
rupa-signals.workspace = true
wasm-bindgen.workspace = true
js-sys.workspace = true
log.workspace = true
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"

[dependencies.web-sys]
workspace = true
features = [
    "HtmlElement",
    "Window",
    "Document",
    "Node",
    "Element",
    "Event",
    "MouseEvent",
    "KeyboardEvent",
    "CanvasRenderingContext2d",
    "CssStyleDeclaration"
]
